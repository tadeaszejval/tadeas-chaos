<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chaos Equations Visualizer</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    overflow: hidden;
    height: 100vh;
  }

  #canvas { position: fixed; top: 0; left: 0; z-index: 0; }

  /* Panel */
  #panel {
    position: fixed; top: 0; right: 0;
    width: 340px; height: 100vh;
    background: rgba(10, 10, 18, 0.88);
    backdrop-filter: blur(20px);
    border-left: 1px solid rgba(255,255,255,0.06);
    z-index: 10;
    overflow-y: auto;
    padding: 24px 20px;
    transition: transform 0.3s ease;
  }
  #panel.collapsed { transform: translateX(100%); }

  #toggle-panel {
    position: fixed; top: 16px; right: 16px; z-index: 20;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: #ccc; border-radius: 8px;
    width: 36px; height: 36px;
    cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  #toggle-panel:hover { background: rgba(255,255,255,0.14); }

  h1 {
    font-size: 15px; font-weight: 600;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #7eb4ff, #c084fc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .subtitle { font-size: 11px; color: #666; margin-bottom: 20px; }

  /* Equation selector */
  .eq-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 6px; margin-bottom: 20px;
  }
  .eq-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    color: #aaa; border-radius: 8px;
    padding: 10px 8px; cursor: pointer;
    font-family: inherit; font-size: 11px;
    text-align: center; transition: all 0.2s;
  }
  .eq-btn:hover { background: rgba(255,255,255,0.08); color: #ddd; }
  .eq-btn.active {
    background: rgba(120, 160, 255, 0.12);
    border-color: rgba(120, 160, 255, 0.35);
    color: #9dc4ff;
  }

  /* Sections */
  .section { margin-bottom: 18px; }
  .section-title {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 1.2px; color: #555;
    margin-bottom: 10px;
  }

  /* Sliders */
  .param-row {
    display: flex; align-items: center;
    margin-bottom: 8px; gap: 8px;
  }
  .param-label {
    font-size: 11px; color: #888;
    min-width: 24px; text-align: right;
  }
  .param-row input[type="range"] {
    flex: 1; -webkit-appearance: none;
    height: 4px; border-radius: 2px;
    background: rgba(255,255,255,0.1);
    outline: none;
  }
  .param-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%;
    background: #7eb4ff; cursor: pointer;
    border: 2px solid #0a0a0f;
  }
  .param-value {
    font-size: 11px; color: #7eb4ff;
    min-width: 44px; text-align: left;
    cursor: text;
  }
  .param-value input {
    width: 44px; background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: #7eb4ff; font-family: inherit;
    font-size: 11px; border-radius: 4px;
    padding: 2px 4px; text-align: center;
    outline: none;
  }
  .param-value input:focus { border-color: #7eb4ff; }

  /* Equation display */
  .equation-display {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px; padding: 12px;
    margin-bottom: 18px;
    font-size: 12px; line-height: 1.7;
    color: #999;
  }
  .equation-display .var { color: #c084fc; }
  .equation-display .param-ref { color: #7eb4ff; }

  /* Buttons */
  .btn-row { display: flex; gap: 6px; margin-bottom: 14px; }
  .btn {
    flex: 1; padding: 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #bbb; border-radius: 6px;
    cursor: pointer; font-family: inherit;
    font-size: 11px; transition: all 0.2s;
  }
  .btn:hover { background: rgba(255,255,255,0.1); }
  .btn.accent {
    background: rgba(120, 160, 255, 0.15);
    border-color: rgba(120, 160, 255, 0.3);
    color: #9dc4ff;
  }

  /* Color pickers */
  .color-row { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; }
  .color-row label { font-size: 11px; color: #888; min-width: 60px; }
  .color-row input[type="color"] {
    -webkit-appearance: none; width: 28px; height: 22px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px; cursor: pointer;
    background: transparent; padding: 0;
  }
  .color-row input[type="color"]::-webkit-color-swatch-wrapper { padding: 1px; }
  .color-row input[type="color"]::-webkit-color-swatch { border: none; border-radius: 3px; }

  /* Info at bottom */
  .info {
    font-size: 10px; color: #444;
    border-top: 1px solid rgba(255,255,255,0.05);
    padding-top: 14px; margin-top: 10px;
    line-height: 1.6;
  }

  /* Stats overlay */
  #stats {
    position: fixed; bottom: 16px; left: 16px;
    font-size: 11px; color: #444; z-index: 10;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<button id="toggle-panel" title="Toggle panel">&equiv;</button>

<div id="panel">
  <h1>CHAOS VISUALIZER</h1>
  <p class="subtitle">Strange attractors in 3D</p>

  <div class="eq-grid" id="eq-grid"></div>

  <div class="equation-display" id="eq-display"></div>

  <div class="section">
    <div class="section-title">Parameters</div>
    <div id="params-container"></div>
  </div>

  <div class="section">
    <div class="section-title">Initial Conditions</div>
    <div id="initial-container"></div>
  </div>

  <div class="btn-row">
    <button class="btn accent" id="btn-reset">Reset</button>
    <button class="btn" id="btn-randomize">Randomize</button>
    <button class="btn" id="btn-pause">Pause</button>
  </div>

  <div class="section">
    <div class="section-title">Rendering</div>
    <div id="render-container"></div>
    <div class="color-row">
      <label>Start</label>
      <input type="color" id="color-start" value="#3366ff">
    </div>
    <div class="color-row">
      <label>End</label>
      <input type="color" id="color-end" value="#cc44ff">
    </div>
  </div>

  <div class="info">
    Drag to rotate &middot; Scroll to zoom &middot; Right-drag to pan<br>
    Click parameter values to type exact numbers
  </div>
</div>

<div id="stats"></div>

<script>
// ─── Equations ─────────────────────────────────────────────
const EQUATIONS = {
  lorenz: {
    name: 'Lorenz',
    params: { σ: { val: 10, min: 0, max: 30, step: 0.1 }, ρ: { val: 28, min: 0, max: 60, step: 0.1 }, β: { val: 2.667, min: 0, max: 10, step: 0.01 } },
    initial: { x: 0.1, y: 0, z: 0 },
    dt: 0.005,
    scale: 1.2,
    eq: `<span class="var">dx/dt</span> = <span class="param-ref">σ</span>(y − x)<br>
         <span class="var">dy/dt</span> = x(<span class="param-ref">ρ</span> − z) − y<br>
         <span class="var">dz/dt</span> = xy − <span class="param-ref">β</span>z`,
    fn: (x, y, z, p) => [p['σ']*(y-x), x*(p['ρ']-z)-y, x*y-p['β']*z],
  },
  rossler: {
    name: 'Rössler',
    params: { a: { val: 0.2, min: 0, max: 1, step: 0.005 }, b: { val: 0.2, min: 0, max: 1, step: 0.005 }, c: { val: 5.7, min: 1, max: 20, step: 0.1 } },
    initial: { x: 1, y: 1, z: 0 },
    dt: 0.008,
    scale: 3.5,
    eq: `<span class="var">dx/dt</span> = −y − z<br>
         <span class="var">dy/dt</span> = x + <span class="param-ref">a</span>y<br>
         <span class="var">dz/dt</span> = <span class="param-ref">b</span> + z(x − <span class="param-ref">c</span>)`,
    fn: (x, y, z, p) => [-(y+z), x+p.a*y, p.b+z*(x-p.c)],
  },
  chen: {
    name: 'Chen',
    params: { a: { val: 35, min: 20, max: 50, step: 0.5 }, b: { val: 3, min: 0, max: 10, step: 0.1 }, c: { val: 28, min: 15, max: 40, step: 0.5 } },
    initial: { x: -0.1, y: 0.5, z: -0.6 },
    dt: 0.002,
    scale: 1.2,
    eq: `<span class="var">dx/dt</span> = <span class="param-ref">a</span>(y − x)<br>
         <span class="var">dy/dt</span> = (<span class="param-ref">c</span> − <span class="param-ref">a</span>)x − xz + <span class="param-ref">c</span>y<br>
         <span class="var">dz/dt</span> = xy − <span class="param-ref">b</span>z`,
    fn: (x, y, z, p) => [p.a*(y-x), (p.c-p.a)*x-x*z+p.c*y, x*y-p.b*z],
  },
  aizawa: {
    name: 'Aizawa',
    params: { a: { val: 0.95, min: 0, max: 2, step: 0.01 }, b: { val: 0.7, min: 0, max: 2, step: 0.01 }, c: { val: 0.6, min: 0, max: 2, step: 0.01 }, d: { val: 3.5, min: 0, max: 6, step: 0.05 }, e: { val: 0.25, min: 0, max: 1, step: 0.01 }, f: { val: 0.1, min: 0, max: 1, step: 0.01 } },
    initial: { x: 0.1, y: 0, z: 0 },
    dt: 0.004,
    scale: 12,
    eq: `<span class="var">dx/dt</span> = (z − <span class="param-ref">b</span>)x − <span class="param-ref">d</span>y<br>
         <span class="var">dy/dt</span> = <span class="param-ref">d</span>x + (z − <span class="param-ref">b</span>)y<br>
         <span class="var">dz/dt</span> = <span class="param-ref">c</span> + <span class="param-ref">a</span>z − z³/3 − (x²+y²)(1+<span class="param-ref">e</span>z) + <span class="param-ref">f</span>zx³`,
    fn: (x, y, z, p) => [
      (z-p.b)*x - p.d*y,
      p.d*x + (z-p.b)*y,
      p.c + p.a*z - z*z*z/3 - (x*x+y*y)*(1+p.e*z) + p.f*z*x*x*x
    ],
  },
  halvorsen: {
    name: 'Halvorsen',
    params: { a: { val: 1.89, min: 1, max: 3, step: 0.01 } },
    initial: { x: -1.48, y: -1.51, z: 2.04 },
    dt: 0.003,
    scale: 2.2,
    eq: `<span class="var">dx/dt</span> = −<span class="param-ref">a</span>x − 4y − 4z − y²<br>
         <span class="var">dy/dt</span> = −<span class="param-ref">a</span>y − 4z − 4x − z²<br>
         <span class="var">dz/dt</span> = −<span class="param-ref">a</span>z − 4x − 4y − x²`,
    fn: (x, y, z, p) => [
      -p.a*x - 4*y - 4*z - y*y,
      -p.a*y - 4*z - 4*x - z*z,
      -p.a*z - 4*x - 4*y - x*x
    ],
  },
  thomas: {
    name: 'Thomas',
    params: { b: { val: 0.208186, min: 0, max: 0.5, step: 0.001 } },
    initial: { x: 1.1, y: 1.1, z: -0.01 },
    dt: 0.03,
    scale: 10,
    eq: `<span class="var">dx/dt</span> = sin(y) − <span class="param-ref">b</span>x<br>
         <span class="var">dy/dt</span> = sin(z) − <span class="param-ref">b</span>y<br>
         <span class="var">dz/dt</span> = sin(x) − <span class="param-ref">b</span>z`,
    fn: (x, y, z, p) => [Math.sin(y)-p.b*x, Math.sin(z)-p.b*y, Math.sin(x)-p.b*z],
  },
  dadras: {
    name: 'Dadras',
    params: { p: { val: 3, min: 1, max: 6, step: 0.05 }, q: { val: 2.7, min: 1, max: 6, step: 0.05 }, r: { val: 1.7, min: 0.5, max: 4, step: 0.05 }, s: { val: 2, min: 0.5, max: 4, step: 0.05 }, e: { val: 9, min: 4, max: 15, step: 0.1 } },
    initial: { x: 1, y: 1, z: 0.1 },
    dt: 0.004,
    scale: 1.6,
    eq: `<span class="var">dx/dt</span> = y − <span class="param-ref">p</span>x + <span class="param-ref">q</span>yz<br>
         <span class="var">dy/dt</span> = <span class="param-ref">r</span>y − xz + z<br>
         <span class="var">dz/dt</span> = <span class="param-ref">s</span>xy − <span class="param-ref">e</span>z`,
    fn: (x, y, z, p) => [y-p.p*x+p.q*y*z, p.r*y-x*z+z, p.s*x*y-p.e*z],
  },
  sprott: {
    name: 'Sprott',
    params: { a: { val: 2.07, min: 1, max: 4, step: 0.01 }, b: { val: 1.79, min: 0.5, max: 3, step: 0.01 } },
    initial: { x: 0.63, y: 0.47, z: -0.54 },
    dt: 0.008,
    scale: 8,
    eq: `<span class="var">dx/dt</span> = y + <span class="param-ref">a</span>xy + xz<br>
         <span class="var">dy/dt</span> = 1 − <span class="param-ref">b</span>x² + yz<br>
         <span class="var">dz/dt</span> = x − x² − y²`,
    fn: (x, y, z, p) => [y+p.a*x*y+x*z, 1-p.b*x*x+y*z, x-x*x-y*y],
  },
};

// ─── State ─────────────────────────────────────────────────
let currentEq = 'lorenz';
let params = {};
let initial = {};
let points = [];
let paused = false;
const MAX_POINTS = 80000;
const STEPS_PER_FRAME = 12;
let renderSettings = {
  trail: { val: 60000, min: 1000, max: 80000, step: 1000 },
  speed: { val: 12, min: 1, max: 40, step: 1 },
  lineWidth: { val: 1.5, min: 0.5, max: 4, step: 0.25 },
};
let zoomSlider = null, zoomValInput = null;

// ─── Camera ────────────────────────────────────────────────
let camTheta = 0.6, camPhi = 0.8, camDist = 90;
let camTarget = [0, 0, 0];
let dragging = false, panning = false;
let lastMouse = [0, 0];

// ─── Canvas setup ──────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
}
window.addEventListener('resize', resize);
resize();

// ─── 3D → 2D projection ───────────────────────────────────
function project(px, py, pz) {
  const eq = EQUATIONS[currentEq];
  const s = eq.scale;
  const x = (px - camTarget[0]) * s;
  const y = (py - camTarget[1]) * s;
  const z = (pz - camTarget[2]) * s;

  const ct = Math.cos(camTheta), st = Math.sin(camTheta);
  const cp = Math.cos(camPhi), sp = Math.sin(camPhi);

  const x1 = x * ct + z * st;
  const z1 = -x * st + z * ct;
  const y1 = y * cp + z1 * sp;
  const z2 = -y * sp + z1 * cp;

  const fov = 90;
  const scale = (canvas.height / 3) * (fov / camDist);
  const perspective = camDist / (camDist + z2);
  const sx = canvas.width / 2 + x1 * perspective * scale;
  const sy = canvas.height / 2 - y1 * perspective * scale;
  return [sx, sy, perspective];
}

// ─── Color interpolation ──────────────────────────────────
function hexToRGB(hex) {
  const n = parseInt(hex.slice(1), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}

function getGradientColor(t) {
  const c1 = hexToRGB(document.getElementById('color-start').value);
  const c2 = hexToRGB(document.getElementById('color-end').value);
  const r = Math.round(c1[0] + (c2[0] - c1[0]) * t);
  const g = Math.round(c1[1] + (c2[1] - c1[1]) * t);
  const b = Math.round(c1[2] + (c2[2] - c1[2]) * t);
  return `rgb(${r},${g},${b})`;
}

// ─── Simulation ────────────────────────────────────────────
function resetSim() {
  const eq = EQUATIONS[currentEq];
  points = [{ x: initial.x, y: initial.y, z: initial.z }];
}

function stepSim() {
  if (paused || points.length === 0) return;
  const eq = EQUATIONS[currentEq];
  const dt = eq.dt;
  const last = points[points.length - 1];
  let { x, y, z } = last;

  for (let i = 0; i < renderSettings.speed.val; i++) {
    const [dx, dy, dz] = eq.fn(x, y, z, params);
    // RK4 integration
    const k1x = dx * dt, k1y = dy * dt, k1z = dz * dt;
    const [d2x, d2y, d2z] = eq.fn(x + k1x/2, y + k1y/2, z + k1z/2, params);
    const k2x = d2x * dt, k2y = d2y * dt, k2z = d2z * dt;
    const [d3x, d3y, d3z] = eq.fn(x + k2x/2, y + k2y/2, z + k2z/2, params);
    const k3x = d3x * dt, k3y = d3y * dt, k3z = d3z * dt;
    const [d4x, d4y, d4z] = eq.fn(x + k3x, y + k3y, z + k3z, params);
    const k4x = d4x * dt, k4y = d4y * dt, k4z = d4z * dt;

    x += (k1x + 2*k2x + 2*k3x + k4x) / 6;
    y += (k1y + 2*k2y + 2*k3y + k4y) / 6;
    z += (k1z + 2*k2z + 2*k3z + k4z) / 6;

    if (!isFinite(x) || !isFinite(y) || !isFinite(z)) {
      resetSim();
      return;
    }
    points.push({ x, y, z });
  }

  const maxTrail = Math.floor(renderSettings.trail.val);
  if (points.length > maxTrail) {
    points = points.slice(points.length - maxTrail);
  }
}

// ─── Render ────────────────────────────────────────────────
function render() {
  ctx.fillStyle = 'rgba(10, 10, 15, 1)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (points.length < 2) return;

  const len = points.length;
  const lw = renderSettings.lineWidth.val * devicePixelRatio;

  // Draw in segments for color gradient
  const segSize = Math.max(1, Math.floor(len / 400));
  ctx.lineWidth = lw;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  for (let i = 1; i < len; i += segSize) {
    const end = Math.min(i + segSize + 1, len);
    const t = i / len;
    const alpha = 0.15 + 0.85 * t;
    ctx.strokeStyle = getGradientColor(t);
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    const [sx0, sy0] = project(points[i-1].x, points[i-1].y, points[i-1].z);
    ctx.moveTo(sx0, sy0);
    for (let j = i; j < end; j++) {
      const [sx, sy] = project(points[j].x, points[j].y, points[j].z);
      ctx.lineTo(sx, sy);
    }
    ctx.stroke();
  }

  ctx.globalAlpha = 1;

  // Draw head glow
  if (len > 0) {
    const last = points[len - 1];
    const [hx, hy] = project(last.x, last.y, last.z);
    const grad = ctx.createRadialGradient(hx, hy, 0, hx, hy, 12 * devicePixelRatio);
    const headColor = getGradientColor(1);
    grad.addColorStop(0, headColor);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(hx - 14 * devicePixelRatio, hy - 14 * devicePixelRatio, 28 * devicePixelRatio, 28 * devicePixelRatio);

    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(hx, hy, 2.5 * devicePixelRatio, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ─── UI building ───────────────────────────────────────────
function buildEqButtons() {
  const grid = document.getElementById('eq-grid');
  grid.innerHTML = '';
  for (const key in EQUATIONS) {
    const btn = document.createElement('button');
    btn.className = 'eq-btn' + (key === currentEq ? ' active' : '');
    btn.textContent = EQUATIONS[key].name;
    btn.onclick = () => {
      currentEq = key;
      loadEquation();
    };
    grid.appendChild(btn);
  }
}

function createSlider(container, label, config, onChange) {
  const row = document.createElement('div');
  row.className = 'param-row';

  const lbl = document.createElement('span');
  lbl.className = 'param-label';
  lbl.textContent = label;

  const slider = document.createElement('input');
  slider.type = 'range';
  slider.min = config.min;
  slider.max = config.max;
  slider.step = config.step;
  slider.value = config.val;

  const valWrap = document.createElement('span');
  valWrap.className = 'param-value';

  const valInput = document.createElement('input');
  valInput.type = 'number';
  valInput.step = config.step;
  valInput.value = parseFloat(config.val).toFixed(countDecimals(config.step));

  valWrap.appendChild(valInput);

  slider.oninput = () => {
    const v = parseFloat(slider.value);
    valInput.value = v.toFixed(countDecimals(config.step));
    onChange(v);
  };
  valInput.onchange = () => {
    let v = parseFloat(valInput.value);
    if (isNaN(v)) v = config.val;
    v = Math.max(config.min, Math.min(config.max, v));
    slider.value = v;
    valInput.value = v.toFixed(countDecimals(config.step));
    onChange(v);
  };

  row.appendChild(lbl);
  row.appendChild(slider);
  row.appendChild(valWrap);
  container.appendChild(row);
  return { slider, valInput };
}

function countDecimals(n) {
  const s = String(n);
  return s.includes('.') ? s.split('.')[1].length : 0;
}

function loadEquation() {
  const eq = EQUATIONS[currentEq];

  // Update buttons
  document.querySelectorAll('.eq-btn').forEach((btn, i) => {
    btn.className = 'eq-btn' + (Object.keys(EQUATIONS)[i] === currentEq ? ' active' : '');
  });

  // Equation display
  document.getElementById('eq-display').innerHTML = eq.eq;

  // Parameters
  params = {};
  const pc = document.getElementById('params-container');
  pc.innerHTML = '';
  for (const key in eq.params) {
    const cfg = eq.params[key];
    params[key] = cfg.val;
    createSlider(pc, key, cfg, v => { params[key] = v; });
  }

  // Initial conditions
  initial = { ...eq.initial };
  const ic = document.getElementById('initial-container');
  ic.innerHTML = '';
  for (const key in eq.initial) {
    createSlider(ic, key, { val: eq.initial[key], min: -10, max: 10, step: 0.01 }, v => {
      initial[key] = v;
    });
  }

  resetSim();
}

function buildRenderControls() {
  const rc = document.getElementById('render-container');
  rc.innerHTML = '';
  const labels = { trail: 'Trail', speed: 'Speed', lineWidth: 'Width' };
  for (const key in renderSettings) {
    createSlider(rc, labels[key], renderSettings[key], v => { renderSettings[key].val = v; });
  }

  // Logarithmic zoom slider
  const zoomRow = document.createElement('div');
  zoomRow.className = 'param-row';

  const lbl = document.createElement('span');
  lbl.className = 'param-label';
  lbl.textContent = 'Zoom';

  const slider = document.createElement('input');
  slider.type = 'range';
  slider.min = -1;    // 10^-1 = 0.1
  slider.max = 9;     // 10^9 = 1 billion
  slider.step = 0.01;
  slider.value = Math.log10(camDist);

  const valWrap = document.createElement('span');
  valWrap.className = 'param-value';
  const valInput = document.createElement('input');
  valInput.type = 'number';
  valInput.step = 1;
  valInput.value = Math.round(camDist);
  valWrap.appendChild(valInput);

  slider.oninput = () => {
    camDist = Math.pow(10, parseFloat(slider.value));
    valInput.value = camDist < 10 ? camDist.toFixed(1) : Math.round(camDist);
  };
  valInput.onchange = () => {
    let v = parseFloat(valInput.value);
    if (isNaN(v) || v <= 0) v = 90;
    v = Math.max(0.1, Math.min(1e9, v));
    camDist = v;
    slider.value = Math.log10(v);
    valInput.value = v < 10 ? v.toFixed(1) : Math.round(v);
  };

  zoomRow.appendChild(lbl);
  zoomRow.appendChild(slider);
  zoomRow.appendChild(valWrap);
  rc.appendChild(zoomRow);
  zoomSlider = slider;
  zoomValInput = valInput;
}

// ─── Mouse controls ───────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  if (e.button === 2 || e.ctrlKey) {
    panning = true;
  } else {
    dragging = true;
  }
  lastMouse = [e.clientX, e.clientY];
  e.preventDefault();
});
canvas.addEventListener('contextmenu', e => e.preventDefault());

window.addEventListener('mousemove', e => {
  if (dragging) {
    const dx = e.clientX - lastMouse[0];
    const dy = e.clientY - lastMouse[1];
    camTheta += dx * 0.005;
    camPhi += dy * 0.005;
    camPhi = Math.max(-Math.PI / 2 + 0.01, Math.min(Math.PI / 2 - 0.01, camPhi));
  }
  if (panning) {
    const dx = e.clientX - lastMouse[0];
    const dy = e.clientY - lastMouse[1];
    const s = EQUATIONS[currentEq].scale;
    camTarget[0] += dx * 0.05 / s;
    camTarget[1] -= dy * 0.05 / s;
  }
  lastMouse = [e.clientX, e.clientY];
});

window.addEventListener('mouseup', () => { dragging = false; panning = false; });

canvas.addEventListener('wheel', e => {
  camDist *= e.deltaY > 0 ? 1.06 : 0.94;
  camDist = Math.max(0.1, Math.min(1e9, camDist));
  if (zoomSlider) {
    zoomSlider.value = Math.log10(camDist);
    zoomValInput.value = camDist < 10 ? camDist.toFixed(1) : Math.round(camDist);
  }
  e.preventDefault();
}, { passive: false });

// Touch support
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    dragging = true;
    lastMouse = [e.touches[0].clientX, e.touches[0].clientY];
  }
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  if (dragging && e.touches.length === 1) {
    const dx = e.touches[0].clientX - lastMouse[0];
    const dy = e.touches[0].clientY - lastMouse[1];
    camTheta += dx * 0.005;
    camPhi += dy * 0.005;
    camPhi = Math.max(-Math.PI / 2 + 0.01, Math.min(Math.PI / 2 - 0.01, camPhi));
    lastMouse = [e.touches[0].clientX, e.touches[0].clientY];
  }
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', () => { dragging = false; });

// ─── Buttons ───────────────────────────────────────────────
document.getElementById('btn-reset').onclick = () => {
  camTarget = [0, 0, 0];
  resetSim();
};
document.getElementById('btn-randomize').onclick = () => {
  const eq = EQUATIONS[currentEq];
  for (const key in eq.params) {
    const cfg = eq.params[key];
    const v = cfg.min + Math.random() * (cfg.max - cfg.min);
    params[key] = v;
  }
  initial.x = (Math.random() - 0.5) * 2;
  initial.y = (Math.random() - 0.5) * 2;
  initial.z = (Math.random() - 0.5) * 2;
  loadEquation(); // rebuild UI with new values
  // Re-apply randomized params
  const pc = document.getElementById('params-container');
  let idx = 0;
  for (const key in eq.params) {
    const cfg = eq.params[key];
    const v = cfg.min + Math.random() * (cfg.max - cfg.min);
    params[key] = v;
    const row = pc.children[idx];
    if (row) {
      row.querySelector('input[type="range"]').value = v;
      row.querySelector('input[type="number"]').value = v.toFixed(countDecimals(cfg.step));
    }
    idx++;
  }
  resetSim();
};
document.getElementById('btn-pause').onclick = function() {
  paused = !paused;
  this.textContent = paused ? 'Play' : 'Pause';
};

document.getElementById('toggle-panel').onclick = () => {
  document.getElementById('panel').classList.toggle('collapsed');
};

// ─── Main loop ─────────────────────────────────────────────
const statsEl = document.getElementById('stats');
let frameCount = 0;
let lastFpsTime = performance.now();
let fps = 0;

function loop() {
  stepSim();
  render();

  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 500) {
    fps = Math.round(frameCount / ((now - lastFpsTime) / 1000));
    frameCount = 0;
    lastFpsTime = now;
  }
  statsEl.textContent = `${fps} fps · ${points.length.toLocaleString()} points`;

  requestAnimationFrame(loop);
}

// ─── Init ──────────────────────────────────────────────────
buildEqButtons();
buildRenderControls();
loadEquation();
loop();
</script>
</body>
</html>
